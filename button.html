<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nekos in space!</title>
    <script>
      window.onload = function () {
        const inIframe = window.self !== window.top;
        if (!inIframe) document.body.classList.add("not-iframe");
      }
    </script>
</head>
<body>
  <style>
    *:not(dialog) {
        margin: 0;
    }
    :root {
        color-scheme: light dark;
    }
    pre {
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    .info {
        display: none;
    }
    .button {
        width: fit-content;
        filter: brightness(90%);
        transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .button:hover {
        filter: brightness(100%);
    }
    
    .not-iframe .button {
        display: none;
    }
    .not-iframe .info {
        display: block;
        margin: 2rem;
    }
  </style>
  <a class="button" href="https://nekos.space" target="_top">
    <img src="button.webp" alt="nekos.space" />
  </a>
  <pre class="info">
